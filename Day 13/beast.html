<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8"/>
        <meta name="view point" content ="width=device-width", initial-scale="1.0"/>
        <title>Beast</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

        <style>
            .beast-pic{
                border-radius: 30px;
                width: 270px;
                height:350px;
                object-fit: cover;
            }
            .setupBorder{
                border: 10px rgb(181, 212, 70) solid;
                display: grid;
                place-content: center;
                height: 550px;
                max-width: 300px;
                background-color: oklch(0.1849 0.0518 28.46);
                padding: 25px;
                 
            }
            
            .box{
                color: whitesmoke;
                text-align: center;
                font-family: "Noto Sans", sans-serif;
            }
            
            .font-setup{
                
                font-style: normal;
                font-weight :250;
            }
            .subheading{
                font-weight: 100;
                font-size: small;
            }

        </style>
    </head>
    <body>
        <div class ="setupBorder box">
            <img class="beast-pic" src="https://i.pinimg.com/1200x/d0/b9/ec/d0b9ec3a33c3b8627f9b1c6958b8fb3d.jpg"/>
            <h1>Beast</h1>
            <p class="subheading">2022<span>•</span></p>
        </div>
    </body>
</html>
