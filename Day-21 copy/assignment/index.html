<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title> Chicken Recipes</title>
    <style>
      :root {
        --primary-bg: whitesmoke;
        --card-bg: white;
      }

      * {
        box-sizing: border-box;
      }

      body {
        background: var(--primary-bg);
        margin: 0;
        padding: 1rem;
        font-family: sans-serif;
      }

      .recipes-container {
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
        width: 100%;
      }

      .card-container {
        background: var(--card-bg);
        border-radius: 1rem;
        box-shadow: rgba(0, 0, 0, 0.1) 0px 4px 12px;
        overflow: hidden;
        width: 100%; 
      }

      .card-container img {
        width: 100%;
        height: 12rem;
        object-fit: cover;
        display: block;
      }

      .card-content-container {
        padding: 1.25rem;
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }

      .card-content-container h3 {
        margin: 0;
        font-size: 1.2rem;
        font-weight: 700;
      }
      .tags-container {
        display: flex;
        gap: 0.5rem;
      }

      .tag {
        background: var(--tag-bg);
        color: var(--tag-text);
        padding: 0.35rem 0.75rem;
        border-radius: 1rem;
        font-size: 0.8rem;
        font-weight: 500;
      }

      .watch-btn {
        display: block;
        width: 100%;
        text-align: center;
        background: var(--btn-bg);
        border: 1px solid var(--btn-border);
        padding: 0.75rem;
        border-radius: 0.5rem;
        color: var(--text-color);
        font-weight: 600;
        font-size: 0.9rem;
        text-decoration: none;
        margin-top: 0.5rem;
        transition: background 0.2s ease;
      }

      .watch-btn:hover {
        background: #e9ecef;
      }
   
      @media (min-width: 600px) {
        .recipes-container {
          display: grid;
          grid-template-columns: repeat(2 ,1fr);
          gap: 1.5rem;
          max-width: 1200px;
          margin: 0 auto;
        }
      }
      @media(min-width: 950px){
        .recipes-container{
          display: grid;
          grid-template-columns: repeat(3 ,1fr);
          gap: 2rem;

        }
      }
    </style>
  </head>
  <body>
    <section id="recipes-grid" class="recipes-container"></section>
    <script src="task.js"></script>
  </body>
</html>
