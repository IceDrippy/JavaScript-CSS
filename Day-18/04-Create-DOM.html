<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <p class="msg">This is cool</p>
    <h1>Super Awesome</h1>
    <h1 class="msg abc">Do Good, Be Good</h1>

    <!-- Each IDs must be unique -->
    <p id="quote">To be, or not to be. NOT!</p>

    <ul>
      <li>👚 Crochet</li>
      <li>📘 Reading</li>
      <li>✈️ Traveling</li>
      <li>🎮 Gaming</li>
      <li>🏸 Badminton</li>
    </ul>

    <script>
      // Make hay while the sun shines
      const funText = document.createElement("h2");
      funText.innerText = "Make hay while the sun shines";

      // append adds element at the end
      document.querySelector("body").append(funText);
    </script>
  </body>
</html>
