    <!-- Task 2.1  Make hobbies appear on screen using JS-->
    <h2>Hobbies</h2>
    <ul class="hobbies-container"></ul>

      //   listItem.innerText = hobby;
      //   document.querySelector(".hobbies-container").append(listItem);
      // });

      const list = document.querySelector(".hobbies-container");
      // list.innerHTML = `<li>Chess</li>
      //                   <li>Cricket</li>`;

      // String -> List Item

      // Array -> String (auto , ) -> Avoid , with join
      list.innerHTML = hobbies.map((hobby) => `<li>${hobby} </li>`).join("");
