<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Stats preview card component</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <style>
      * {
        box-sizing: border-box;
      }

      :root {
        --primary-bg-clr: hsl(233, 47%, 7%);
        --card-bg-clr: hsl(244, 37%, 16%);
        --accent-clr: hsl(277, 64%, 61%);

        --primary-text-clr: hsl(0, 0%, 100%);
        --secondary-text-clr: hsla(0, 0%, 100%, 0.75);

        --stats-heading-clr: hsla(0, 0%, 100%, 0.6);

        --primary-ff: Inter, sans-serif;
        --secondary-ff: "Lexend Deca", sans-serif;
        --fw-1: 400;
        --fw-2: 700;

        --primary-font-sz: 15px;
      }

      .social-card-container {
        background: var(--card-bg-clr);
        font-family: var(--primary-ff);
        border-radius: 0.5rem;

        overflow: hidden;
      }

      .content-container {
        color: var(--primary-text-clr);
        padding: 1rem;
        text-align: center;
        font-size: var(--primary-font-sz);
      }

      .highlight {
        color: var(--accent-clr);
      }

      .card-summary {
        color: var(--stats-heading-clr);
        font-size: calc(0.8 * var(--primary-font-sz));
        line-height: 1.5;
      }

      .stats-container {
        display: flex;
        flex-direction: column;
        gap: 1rem;

        p {
          font-size: 1rem;
          margin: 0px;
          margin-block-end: 0.4rem;
        }

        h4 {
          text-transform: uppercase;
          color: var(--stats-heading-clr);
          margin: 0px;
          font-size: 0.5rem;
          letter-spacing: 1.5px;
          font-family: var(--secondary-ff);
          font-weight: 400;
        }
      }

      .image-container {
        background: url("./images/image-header-desktop.jpg"), var(--accent-clr);
        background-blend-mode: hard-light;
        background-size: cover;
        height: 12rem;
      }

      /* width - inline, height - block  */

      @media (width >= 400px) {
        .stats-container {
          flex-direction: row;
          margin-block-start: 3rem;
          justify-content: center;
        }
      }

      @media (width >= 600px) {
        .social-card-container {
          display: flex;
          flex-direction: row-reverse;
          max-width: 40rem;
        }

        .image-container {
          width: 50%;
          height: auto;
          flex-shrink: 0;
        }

        .stats-container {
          justify-content: flex-start;
        }

        .content-container {
          text-align: left;
          padding: 2rem;
          padding-inline-end: 3rem;
        }
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-content: center;
        background: var(--primary-bg-clr);
      }
    </style>
  </head>
  <body>
    <section class="social-card-container">
      <div class="image-container"></div>
      <div class="content-container">
        <h2 class="card-title">
          Get <span class="highlight">insights</span> that help your business
          grow.
        </h2>
        <p class="card-summary">
          Discover the benefits of data analytics and make better decisions
          regarding revenue, customer experience, and overall efficiency.
        </p>
        <div class="stats-container">
          <div>
            <p>10k+</p>
            <h4>companies</h4>
          </div>
          <div>
            <p>314</p>
            <h4>templates</h4>
          </div>
          <div>
            <p>12M+</p>
            <h4>queries</h4>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
