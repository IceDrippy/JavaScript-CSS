<!DOCTYPE html>
<html>

  <meta charset ="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link
    rel="icon"
    type="image/png"
    size="32x32"
    href="./images/favicon-32x32.png"
  />

  <title>Front Mentor | Stats preview  card component</title>

  <style>
    *{
      box-sizing: border-box;
    }
    :root{
      --primary-bg-clr: hsl(232.94deg 48.57% 6.86%);
      --img--clr:hsl(277, 64%, 61%);
      --content-clr:hsl(244deg 36.59% 16.08%);
      --primary-text-clr:hsl(0, 0%, 100%);
      --secondary-text-clr:hsla(0, 0%, 100%, 0.75);
      --stats-heading-clr:hsla(0, 0%, 100%, 0.6);
      --primary-ff: Inter, san-serif;
      --secondary-ff: "Lexend Deca" ,san-serif:
      
    }
    body{
      margin:0px;
      min-height: 100vh;
      display: grid;
      place-content: center;
    }

    body{
      background-color: var(--primary-bg-clr);
    }

    .primary-container{
      width: 350px;
      aspect-ratio: 1/2;
      border: 2px solid pink;
      border-radius: 1rem;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .img-container{
      background: url(./images/image-header-mobile.jpg);
      background-color: var(--img--clr);
      background-blend-mode: luminosity;
      background-size:cover;
      height: 17rem;
    }
    h1{
      color: var(--primary-text-clr);
      font-weight: bold;
      font-family: var(--secondary-ff);
      font-size:1.5rem;
    }

    .content-container{
      text-align: center;
      margin:0px;
      padding-inline: 4rem;
      background-color: var(--content-clr);
      height: 100%;
     
    }

    .desc{
      color: var(--stats-heading-clr);
      font-family: var(--primary-text-clr);
      font-size: 1rem;
    }

    .stats-container{
      font-family: var(--secondary-ff);
      display: flex;
      flex-direction: column;
    }

    @media(width >= 600px){
      .primary-container{
        display: flex;
        flex-direction: row-reverse;
      }
      .img-container{
        height: 50%;
        
      }
      .content-container{
        

      }


    }


  </style>

  <body>
    <section class="primary-container">
      <div class="img-container"> 
      </div>
      <div class ="content-container">
        <h1> Get insights that help your buisness grow.</h1>
        <div class ="desc">
          <p>
            Discover the benefits of data analytics and make better decisions regarding revenue, customer experience ,and overall efficiency.
          </p>
        </div>

         <div class="stats-container">
        <div>
           <h1>10k+</h1>
           <p><span style=" color : var(--secondary-text-clr) ">COMPANIES</span></p>
        </div>
        
         <div>
           <h1>314</h1>
           <p><span style=" color : var(--secondary-text-clr) ">TEMPLATES</span></p>
        </div>

         <div>
           <h1>12M+</h1>
           <p><span style=" color : var(--secondary-text-clr) ">QUERIES</span></p>
        </div>


      </div>

      </div>
     
     
      
    </section>  
    

  </body>

</html>
