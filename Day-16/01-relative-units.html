<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      /* Designer - Fixed - Double */

      /* Central settings */
      :root {
        /* 1rem = 16px */
        /* Entire control in one place */
        font-size: 16px;
      }

      h4 {
        /* Absolute unit */
        font-size: 28px;
      }

      div {
        font-size: 2rem;
      }

      p {
        /* 1em = 2rem */
        /* 2em in px? */
        font-size: 2em;
      }

      button {
        padding: 0.5rem 1rem;
        border-radius: 1000px;
        font-size: 1.5rem;
      }
    </style>
  </head>
  <body>
    <h4>Heading</h4>
    <div>
      <p>This is awesome</p>
    </div>

    <button>Awesome</button>
  </body>
</html>

<!-- 
rem - Looks at root font size - Recommend
em  - Looks parent font size
-->
