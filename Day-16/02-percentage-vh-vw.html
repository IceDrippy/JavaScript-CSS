<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      .box {
        width: 500px;
        background: orange;
      }

      .child {
        background: pink;
        width: 50%;
      }

      .box-1 {
        /* 1vw - 1% viewport width */
        width: 50vw;
        background: orange;
      }

      .child-1 {
        background: pink;
        width: 50%;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <p class="child">
        Lorem ipsum dolor sit amet consectetur adipisicing elit. Repudiandae,
        expedita.
      </p>
    </div>

    <div class="box-1">
      <p class="child-1">
        Lorem ipsum dolor sit amet consectetur adipisicing elit. Repudiandae,
        expedita.
      </p>
    </div>
  </body>
</html>
